upstream backend_upstream {
    server backend:8000;
}

upstream frontend_upstream {
    server frontend:80;
}

# --- rate limiting zones (defense in depth; backend slowapi is primary) ---
# auth zone: 5 req/s per IP burst 10 → effectively ~5-10 login attempts/s max
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/s;
# general API zone: 50 req/s per IP
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=50r/s;

server {
    listen 80;
    server_name _;

    # -------- Security headers --------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS: 1 year, include subdomains (safe because we only serve via HTTPS
    # via Cloudflare Tunnel). Keep preload off until you own the apex.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: app is served same-origin; no inline scripts after Vite build.
    # Tailwind generates <style> tags with hashes so allow inline styles.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Body size (CSV import 等のため多少広めに)
    client_max_body_size 10m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Auth endpoints — tighter limit (brute force protection)
    location ~ ^/api/v1/auth/(login|refresh|change-password) {
        limit_req zone=auth_zone burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API
    location /api/ {
        limit_req zone=api_zone burst=100 nodelay;
        limit_req_status 429;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Swagger / OpenAPI — blocked at proxy layer in production.
    # Backend also sets docs_url=None when APP_ENV=production, but block
    # here as defense in depth in case APP_ENV is misconfigured.
    location = /docs         { return 404; }
    location = /redoc        { return 404; }
    location = /openapi.json { return 404; }

    # Frontend (SPA)
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
